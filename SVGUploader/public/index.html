<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Uploader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        input[type="file"] {
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: #764ba2;
            background-color: #f8f9ff;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.info {
            background-color: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
            display: block;
        }

        .status.error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
            display: block;
        }

        .status.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
            display: block;
        }

        .response-section {
            margin-top: 30px;
        }

        .response-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        #response {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
        }

        #response:empty {
            display: none;
        }

        .file-name {
            font-weight: 600;
            color: #667eea;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SVG File Uploader</h1>
        <p class="subtitle">Upload an SVG file to send it to an external API via PUT request</p>

        <div class="upload-section">
            <form id="uploadForm">
                <div class="file-input-wrapper">
                    <input type="file" id="svgFile" name="svgFile" accept=".svg,image/svg+xml" required>
                </div>
                <div id="fileName" class="file-name"></div>
                <button type="submit" id="uploadBtn">Upload and Send</button>
            </form>
            <div id="status" class="status"></div>
        </div>

        <div class="response-section">
            <h2>API Response</h2>
            <pre id="response"></pre>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('svgFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        const responseDiv = document.getElementById('response');
        const fileNameDiv = document.getElementById('fileName');

        // Display selected file name
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDiv.textContent = `Selected: ${e.target.files[0].name}`;
            } else {
                fileNameDiv.textContent = '';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) {
                showStatus('Please select an SVG file', 'error');
                return;
            }

            // Create FormData and append the file
            const formData = new FormData();
            formData.append('svgFile', file);

            // Show loading status
            showStatus('Uploading and sending to API...', 'info');
            uploadBtn.disabled = true;
            responseDiv.textContent = '';

            try {
                // Send POST request to backend
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(`Success! External API returned status ${data.status}`, 'success');
                    
                    // Display the response in a formatted way
                    responseDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    showStatus(`Error: ${data.error || 'Upload failed'}`, 'error');
                    responseDiv.textContent = JSON.stringify(data, null, 2);
                }

            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                responseDiv.textContent = `Failed to connect to server: ${error.message}`;
            } finally {
                uploadBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
    </script>
</body>
</html>
